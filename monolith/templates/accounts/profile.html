{% extends 'base.html' %}

{% block title %}Profile - Bookstore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-person-circle"></i> My Profile</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 text-center">
                        <i class="bi bi-person-circle" style="font-size: 100px; color: #6c757d;"></i>
                    </div>
                    <div class="col-md-8">
                        <table class="table">
                            <tr>
                                <th>Name:</th>
                                <td>{{ customer.name }}</td>
                            </tr>
                            <tr>
                                <th>Email:</th>
                                <td>{{ customer.email }}</td>
                            </tr>
                            <tr>
                                <th>Member Since:</th>
                                <td>{{ customer.date_joined|date:"F d, Y" }}</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
