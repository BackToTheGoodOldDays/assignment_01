{% extends 'base.html' %}
{% block content %}
<div class="book-detail-card">
    <div class="book-detail-img">
        <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn|default:'9780140449136' }}-L.jpg" alt="{{ book.title }}" onerror="this.src='https://img.icons8.com/ios-filled/150/cccccc/book.png'">
    </div>
    <div class="book-detail-info">
        <h1>{{ book.title }}</h1>
        <div class="book-detail-author">Tác giả: <b>{{ book.author }}</b></div>
        <div class="book-detail-price">Giá: <span>{{ book.price|floatformat:0 }}₫</span></div>
        <div class="book-detail-stock {% if book.is_available %}in-stock{% else %}out-stock{% endif %}">
            {% if book.is_available %}Còn {{ book.stock }} cuốn{% else %}Hết hàng{% endif %}
        </div>
        <div class="book-detail-desc">{{ book.description }}</div>
        <form method="post" action="{% url 'cart:add' book.id %}" class="book-detail-form">
            {% csrf_token %}
            <input type="number" name="quantity" value="1" min="1" max="{{ book.stock }}" {% if not book.is_available %}disabled{% endif %}>
            <button type="submit" {% if not book.is_available %}disabled style="background:#ccc;cursor:not-allowed;"{% endif %}>Thêm vào giỏ hàng</button>
        </form>
        <a href="{% url 'books:catalog' %}" class="back-catalog">← Quay lại danh sách</a>
    </div>
</div>
<style>
.book-detail-card {
    display: flex;
    gap: 38px;
    background: #f8fafc;
    border-radius: 18px;
    box-shadow: 0 2px 16px rgba(37,99,235,0.07);
    padding: 32px 28px;
    align-items: flex-start;
    margin-bottom: 18px;
}
.book-detail-img img {
    width: 180px;
    height: 260px;
    object-fit: cover;
    border-radius: 10px;
    background: #e0e7ff;
    box-shadow: 0 2px 8px rgba(56,189,248,0.10);
}
.book-detail-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.book-detail-info h1 {
    font-size: 2em;
    color: #2563eb;
    margin: 0 0 8px 0;
}
.book-detail-author {
    color: #555;
    font-size: 1.08em;
}
.book-detail-price {
    color: #22c55e;
    font-size: 1.18em;
    font-weight: 600;
    margin-bottom: 4px;
}
.book-detail-price span { font-size: 1.2em; }
.book-detail-stock {
    font-size: 1em;
    font-weight: 500;
    margin-bottom: 8px;
}
.in-stock { color: #22c55e; }
.out-stock { color: #ef4444; }
.book-detail-desc {
    color: #444;
    font-size: 1.05em;
    margin-bottom: 10px;
    min-height: 48px;
}
.book-detail-form {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
}
.book-detail-form input[type="number"] {
    width: 60px;
    padding: 7px 8px;
    border-radius: 6px;
    border: 1.5px solid #e0e7ef;
    font-size: 1em;
    background: #fff;
}
.book-detail-form button {
    background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
    color: #fff;
    border-radius: 7px;
    padding: 8px 18px;
    font-size: 1em;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: background 0.18s;
}
.book-detail-form button:hover { background: #2563eb; }
.back-catalog {
    display: inline-block;
    margin-top: 8px;
    color: #2563eb;
    text-decoration: none;
    font-size: 1em;
    transition: color 0.18s;
}
.back-catalog:hover { color: #38bdf8; text-decoration: underline; }
@media (max-width: 700px) {
    .book-detail-card { flex-direction: column; gap: 18px; padding: 12px 4px; }
    .book-detail-img img { width: 110px; height: 160px; }
}
</style>
{% endblock %}
