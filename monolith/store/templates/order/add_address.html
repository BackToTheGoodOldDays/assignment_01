{% extends 'base.html' %}
{% block content %}
<div class="add-address-container">
    <h1>{% if address %}Sửa địa chỉ{% else %}Thêm địa chỉ mới{% endif %}</h1>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="post" class="address-form">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="recipient_name">Họ tên người nhận *</label>
                <input type="text" name="recipient_name" id="recipient_name" required
                       value="{{ address.recipient_name|default:'' }}"
                       placeholder="Nguyễn Văn A">
            </div>
            
            <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input type="tel" name="phone" id="phone" required
                       value="{{ address.phone|default:'' }}"
                       placeholder="0901234567">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="city">Tỉnh/Thành phố *</label>
                <select name="city" id="city" required>
                    <option value="">Chọn tỉnh/thành phố</option>
                    <option value="Hà Nội" {% if address.city == 'Hà Nội' %}selected{% endif %}>Hà Nội</option>
                    <option value="TP. Hồ Chí Minh" {% if address.city == 'TP. Hồ Chí Minh' %}selected{% endif %}>TP. Hồ Chí Minh</option>
                    <option value="Đà Nẵng" {% if address.city == 'Đà Nẵng' %}selected{% endif %}>Đà Nẵng</option>
                    <option value="Hải Phòng" {% if address.city == 'Hải Phòng' %}selected{% endif %}>Hải Phòng</option>
                    <option value="Cần Thơ" {% if address.city == 'Cần Thơ' %}selected{% endif %}>Cần Thơ</option>
                    <!-- Add more cities as needed -->
                </select>
            </div>
            
            <div class="form-group">
                <label for="district">Quận/Huyện *</label>
                <input type="text" name="district" id="district" required
                       value="{{ address.district|default:'' }}"
                       placeholder="Quận/Huyện">
            </div>
            
            <div class="form-group">
                <label for="ward">Phường/Xã</label>
                <input type="text" name="ward" id="ward"
                       value="{{ address.ward|default:'' }}"
                       placeholder="Phường/Xã">
            </div>
        </div>
        
        <div class="form-group">
            <label for="detail">Địa chỉ chi tiết *</label>
            <textarea name="detail" id="detail" rows="3" required
                      placeholder="Số nhà, tên đường, tòa nhà, căn hộ...">{{ address.detail|default:'' }}</textarea>
        </div>
        
        <div class="form-group checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" name="is_default" value="true"
                       {% if address.is_default %}checked{% endif %}>
                <span>Đặt làm địa chỉ mặc định</span>
            </label>
        </div>
        
        <div class="form-actions">
            <a href="{% url 'cart:addresses' %}" class="btn-cancel">Hủy</a>
            <button type="submit" class="btn-submit">
                {% if address %}Cập nhật{% else %}Thêm địa chỉ{% endif %}
            </button>
        </div>
    </form>
</div>

<style>
.add-address-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
}
.add-address-container h1 {
    color: #2563eb;
    margin-bottom: 30px;
}
.messages {
    margin-bottom: 20px;
}
.alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 10px;
}
.alert-success { background: #d1fae5; color: #059669; }
.alert-error { background: #fee2e2; color: #dc2626; }
.address-form {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e0e7ff;
    border-radius: 8px;
    font-size: 1em;
    transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #2563eb;
}
.form-group textarea {
    resize: vertical;
}
.checkbox-group {
    margin-top: 10px;
}
.checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-weight: normal !important;
}
.checkbox-label input {
    width: auto;
    width: 18px;
    height: 18px;
    accent-color: #2563eb;
}
.form-actions {
    display: flex;
    gap: 16px;
    justify-content: flex-end;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #e0e7ff;
}
.btn-cancel, .btn-submit {
    padding: 12px 30px;
    border-radius: 8px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
}
.btn-cancel {
    background: #f0f0f0;
    color: #666;
}
.btn-submit {
    background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
    color: #fff;
}
</style>
{% endblock %}
