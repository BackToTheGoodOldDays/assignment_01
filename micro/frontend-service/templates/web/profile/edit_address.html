{% extends 'base.html' %}

{% block title %}Edit Address - Bookstore{% endblock %}

{% block content %}
<h1>Edit Address</h1>

<form method="post" class="address-form">
    {% csrf_token %}
    <div class="form-group">
        <label for="name">Address Name</label>
        <input type="text" name="name" id="name" value="{{ address.name }}" required>
    </div>
    <div class="form-group">
        <label for="street">Street Address</label>
        <input type="text" name="street" id="street" value="{{ address.street }}" required>
    </div>
    <div class="form-group">
        <label for="city">City</label>
        <input type="text" name="city" id="city" value="{{ address.city }}" required>
    </div>
    <div class="form-group">
        <label for="state">State/Province</label>
        <input type="text" name="state" id="state" value="{{ address.state }}" required>
    </div>
    <div class="form-group">
        <label for="zip_code">ZIP/Postal Code</label>
        <input type="text" name="zip_code" id="zip_code" value="{{ address.zip_code }}" required>
    </div>
    <div class="form-group">
        <label for="country">Country</label>
        <input type="text" name="country" id="country" value="{{ address.country }}" required>
    </div>
    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" name="phone" id="phone" value="{{ address.phone }}">
    </div>
    <div class="form-group">
        <label>
            <input type="checkbox" name="is_default" {% if address.is_default %}checked{% endif %}>
            Set as default address
        </label>
    </div>
    <button type="submit">Update Address</button>
</form>

<a href="{% url 'web:addresses' %}">Back to Addresses</a>
{% endblock %}
