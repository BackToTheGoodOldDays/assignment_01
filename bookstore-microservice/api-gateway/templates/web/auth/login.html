{% extends 'web/base.html' %}
{% block title %}Login - BookStore{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:40px auto;">
    <h2>Customer Login</h2>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">Login</button>
    </form>
    <p style="margin-top:15px;text-align:center;">Don't have an account? <a href="/register/">Register</a></p>
    <p style="text-align:center;margin-top:10px;"><a href="/staff/login/">Staff Login</a> | <a href="/manager/login/">Manager Login</a></p>
</div>
{% endblock %}
